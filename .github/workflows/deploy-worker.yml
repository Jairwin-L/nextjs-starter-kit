name: Deploy Cloudflare Worker

on:
  push:
    branches:
      - dev
  pull_request_target:
    branches:
      - main
    types:
      - closed
  workflow_dispatch:
    inputs:
      environment:
        description: Cloudflare Worker environment to deploy
        required: true
        default: development
        type: choice
        options:
          - development
          - production

concurrency:
  group: cloudflare-worker-${{ github.event_name == 'workflow_dispatch' && inputs.environment || github.event_name == 'pull_request_target' && 'production' || 'development' }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    if: >-
      github.actor == github.repository_owner &&
      (
        (github.event_name == 'pull_request_target' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main') ||
        (github.event_name == 'push' && github.ref_name == 'dev') ||
        github.event_name == 'workflow_dispatch'
      )
    environment:
      name: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || github.event_name == 'pull_request_target' && 'production' || 'development' }}
    permissions:
      contents: read
    env:
      CLOUDFLARE_ENV: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || github.event_name == 'pull_request_target' && 'production' || 'development' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha || github.sha }}

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '22'
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Generate Prisma Client
        run: vp run prisma:generate

      - name: Verify
        run: vp run verify

      - name: Build Cloudflare Worker
        run: vp run cf:build

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4.104.0'
          command: deploy --env ${{ env.CLOUDFLARE_ENV }}
          environment: ${{ env.CLOUDFLARE_ENV }}
          secrets: |
            DATABASE_URL
            AUTH_CODE_SECRET
            RESEND_API_KEY
            RESEND_FROM_EMAIL
            RESEND_FROM_NAME
            R2_ACCESS_KEY_ID
            R2_SECRET_ACCESS_KEY
            R2_ENDPOINT_URL
            R2_BUCKET_NAME
            TINYPNG_API_KEY
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AUTH_CODE_SECRET: ${{ secrets.AUTH_CODE_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
          RESEND_FROM_NAME: ${{ secrets.RESEND_FROM_NAME }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          TINYPNG_API_KEY: ${{ secrets.TINYPNG_API_KEY }}
