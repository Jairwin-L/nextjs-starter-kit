name: Build and Deploy

on:
  push:
    branches:
      - dev
  pull_request_target:
    branches:
      - main
    types:
      - closed
  workflow_dispatch:

jobs:
  validate:
    name: Validate with Vite+
    runs-on: ubuntu-latest
    if: >-
      github.actor == github.repository_owner &&
      (
        (github.event_name == 'pull_request_target' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main') ||
        (github.event_name == 'push' && github.ref_name == 'dev') ||
        (github.event_name == 'workflow_dispatch' && github.ref_name == 'dev')
      )
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha || github.sha }}

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '22'
          cache: true

      - name: Install dependencies
        run: vp install

      - name: Verify
        run: vp run verify

  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: validate
    environment:
      name: ${{ github.event_name == 'pull_request_target' && 'production' || 'development' }}
    permissions:
      contents: read
      packages: write
    outputs:
      commit_sha: ${{ steps.image.outputs.sha }}
      image_tag: ${{ steps.image.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha || github.sha }}

      - name: Resolve image name
        id: image
        shell: bash
        run: |
          COMMIT_SHA="${{ github.event.pull_request.merge_commit_sha || github.sha }}"
          IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "name=${IMAGE_NAME}" >> "${GITHUB_OUTPUT}"
          echo "sha=${COMMIT_SHA}" >> "${GITHUB_OUTPUT}"
          echo "tag=${IMAGE_NAME}:${COMMIT_SHA}" >> "${GITHUB_OUTPUT}"
          echo "migrate_tag=${IMAGE_NAME}:${COMMIT_SHA}-migrate" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runner
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push migration image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: migrator
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest-migrate
            ${{ steps.image.outputs.migrate_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: ${{ github.event_name == 'pull_request_target' && 'production' || 'development' }}
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha || github.sha }}

      - name: Configure SSH
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          : "${DEPLOY_HOST:?Missing required secret DEPLOY_HOST}"
          : "${DEPLOY_PORT:?Missing required secret DEPLOY_PORT}"
          : "${DEPLOY_SSH_KEY:?Missing required secret DEPLOY_SSH_KEY}"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${DEPLOY_SSH_KEY}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -T 10 -p "${DEPLOY_PORT}" -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts || {
            echo "Failed to scan SSH host key for ${DEPLOY_HOST}:${DEPLOY_PORT}."
            echo "Check DEPLOY_HOST, DEPLOY_PORT, firewall rules, and whether SSH is reachable from GitHub Actions."
            exit 1
          }

      - name: Pull image and restart app
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_ENV_FILE: ${{ vars.DEPLOY_ENV_FILE || secrets.DEPLOY_ENV_FILE || (github.event_name == 'pull_request_target' && '.env.production' || '.env.development') }}
          COMPOSE_PROJECT_NAME: ${{ vars.COMPOSE_PROJECT_NAME || secrets.COMPOSE_PROJECT_NAME || (github.event_name == 'pull_request_target' && 'nextjs-starter-kit-prod' || 'nextjs-starter-kit-dev') }}
          DEPLOY_ENVIRONMENT: ${{ github.event_name == 'pull_request_target' && 'production' || 'development' }}
          DEPLOY_SHA: ${{ needs.build.outputs.commit_sha }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN || secrets.GITHUB_TOKEN }}
          APP_PORT: ${{ vars.APP_PORT || (github.event_name == 'pull_request_target' && '8062' || '8060') }}
          POSTGRES_DB: ${{ vars.POSTGRES_DB || (github.event_name == 'pull_request_target' && 'nextjs_starter_kit' || 'nextjs_starter_kit_dev') }}
          POSTGRES_USER: ${{ vars.POSTGRES_USER || 'nextjs_starter_kit' }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD || vars.POSTGRES_PASSWORD || 'nextjs_starter_kit' }}
          DATABASE_URL: ${{ secrets.DATABASE_URL || (github.event_name == 'pull_request_target' && 'postgresql://nextjs_starter_kit:nextjs_starter_kit@postgres:5432/nextjs_starter_kit?schema=public' || 'postgresql://nextjs_starter_kit:nextjs_starter_kit@postgres:5432/nextjs_starter_kit_dev?schema=public') }}
          AUTH_CODE_SECRET: ${{ secrets.AUTH_CODE_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ vars.RESEND_FROM_EMAIL || secrets.RESEND_FROM_EMAIL }}
          RESEND_FROM_NAME: ${{ vars.RESEND_FROM_NAME || secrets.RESEND_FROM_NAME }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL: ${{ vars.R2_ENDPOINT_URL || secrets.R2_ENDPOINT_URL }}
          R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME || secrets.R2_BUCKET_NAME }}
          TINYPNG_API_KEY: ${{ secrets.TINYPNG_API_KEY }}
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
          MIGRATE_IMAGE: ${{ needs.build.outputs.image_tag }}-migrate
        run: |
          : "${DEPLOY_HOST:?Missing required secret DEPLOY_HOST}"
          : "${DEPLOY_PORT:?Missing required secret DEPLOY_PORT}"
          : "${DEPLOY_USER:?Missing required secret DEPLOY_USER}"
          : "${DEPLOY_PATH:?Missing required secret DEPLOY_PATH}"
          : "${DEPLOY_ENV_FILE:?Missing DEPLOY_ENV_FILE}"
          : "${COMPOSE_PROJECT_NAME:?Missing COMPOSE_PROJECT_NAME}"
          : "${DEPLOY_ENVIRONMENT:?Missing DEPLOY_ENVIRONMENT}"
          : "${DEPLOY_SHA:?Missing deploy sha}"
          : "${IMAGE_TAG:?Missing image tag}"
          : "${MIGRATE_IMAGE:?Missing migration image tag}"
          : "${GHCR_READ_TOKEN:?Missing GHCR token}"
          : "${AUTH_CODE_SECRET:?Missing required secret AUTH_CODE_SECRET}"
          : "${RESEND_API_KEY:?Missing required secret RESEND_API_KEY}"
          : "${RESEND_FROM_EMAIL:?Missing required variable or secret RESEND_FROM_EMAIL}"
          : "${R2_ACCESS_KEY_ID:?Missing required secret R2_ACCESS_KEY_ID}"
          : "${R2_SECRET_ACCESS_KEY:?Missing required secret R2_SECRET_ACCESS_KEY}"
          : "${R2_ENDPOINT_URL:?Missing required variable or secret R2_ENDPOINT_URL}"
          : "${R2_BUCKET_NAME:?Missing required variable or secret R2_BUCKET_NAME}"

          runtime_env="$(mktemp)"
          remote_env_tmp="/tmp/nextjs-starter-kit-${DEPLOY_ENVIRONMENT}-${DEPLOY_SHA}.env"
          remote_script="$(mktemp)"
          trap 'rm -f "${runtime_env}" "${remote_script}"' EXIT

          write_env() {
            local key="$1"
            local value="$2"

            if [[ "${value}" == *$'\n'* || "${value}" == *$'\r'* ]]; then
              echo "Environment value for ${key} must be a single line." >&2
              exit 1
            fi

            value=${value//\'/\'\\\'\'}
            printf "%s='%s'\n" "${key}" "${value}" >> "${runtime_env}"
          }

          write_env APP_PORT "${APP_PORT}"
          write_env APP_IMAGE "${IMAGE_TAG}"
          write_env MIGRATE_IMAGE "${MIGRATE_IMAGE}"
          write_env POSTGRES_DB "${POSTGRES_DB}"
          write_env POSTGRES_USER "${POSTGRES_USER}"
          write_env POSTGRES_PASSWORD "${POSTGRES_PASSWORD}"
          write_env DATABASE_URL "${DATABASE_URL}"
          write_env AUTH_CODE_SECRET "${AUTH_CODE_SECRET}"
          write_env RESEND_API_KEY "${RESEND_API_KEY}"
          write_env RESEND_FROM_EMAIL "${RESEND_FROM_EMAIL}"
          write_env RESEND_FROM_NAME "${RESEND_FROM_NAME}"
          write_env R2_ACCESS_KEY_ID "${R2_ACCESS_KEY_ID}"
          write_env R2_SECRET_ACCESS_KEY "${R2_SECRET_ACCESS_KEY}"
          write_env R2_ENDPOINT_URL "${R2_ENDPOINT_URL}"
          write_env R2_BUCKET_NAME "${R2_BUCKET_NAME}"
          write_env TINYPNG_API_KEY "${TINYPNG_API_KEY}"

          {
            echo "set -euo pipefail"
            echo 'cd "${DEPLOY_PATH}"'
            echo 'mv "${REMOTE_ENV_TMP}" "${DEPLOY_ENV_FILE}"'
            echo 'chmod 600 "${DEPLOY_ENV_FILE}"'
            echo 'chmod +x scripts/deploy-compose.sh'
            echo 'if [ ! -x scripts/deploy-compose.sh ]; then echo "Missing executable script: scripts/deploy-compose.sh" && exit 1; fi'
            echo 'DEPLOY_ENV_FILE="${DEPLOY_ENV_FILE}" COMPOSE_PROJECT_NAME="${COMPOSE_PROJECT_NAME}" scripts/deploy-compose.sh "${DEPLOY_ENVIRONMENT}" "${IMAGE_TAG}"'
          } > "${remote_script}"

          ssh -i ~/.ssh/deploy_key -p "${DEPLOY_PORT}" \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "mkdir -p '${DEPLOY_PATH}/scripts'"

          scp -i ~/.ssh/deploy_key -P "${DEPLOY_PORT}" \
            "${runtime_env}" \
            "${DEPLOY_USER}@${DEPLOY_HOST}:${remote_env_tmp}"

          scp -i ~/.ssh/deploy_key -P "${DEPLOY_PORT}" \
            docker-compose.prod.yml \
            "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/docker-compose.prod.yml"

          scp -i ~/.ssh/deploy_key -P "${DEPLOY_PORT}" \
            docker-compose.dev.yml \
            "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/docker-compose.dev.yml"

          scp -i ~/.ssh/deploy_key -P "${DEPLOY_PORT}" \
            scripts/deploy-compose.sh \
            "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/scripts/deploy-compose.sh"

          printf '%s\n' "${GHCR_READ_TOKEN}" | ssh -i ~/.ssh/deploy_key -p "${DEPLOY_PORT}" \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "docker login ghcr.io -u '${{ github.repository_owner }}' --password-stdin"

          ssh -i ~/.ssh/deploy_key -p "${DEPLOY_PORT}" \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "DEPLOY_PATH='${DEPLOY_PATH}' DEPLOY_ENV_FILE='${DEPLOY_ENV_FILE}' COMPOSE_PROJECT_NAME='${COMPOSE_PROJECT_NAME}' DEPLOY_ENVIRONMENT='${DEPLOY_ENVIRONMENT}' IMAGE_TAG='${IMAGE_TAG}' REMOTE_ENV_TMP='${remote_env_tmp}' bash -s" < "${remote_script}"
