services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nextjs_starter_kit}
      POSTGRES_USER: ${POSTGRES_USER:-nextjs_starter_kit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nextjs_starter_kit}
    volumes:
      - postgres-prod-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-prod-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ${APP_IMAGE:?APP_IMAGE is required, for example ghcr.io/owner/nextjs-starter-kit:latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NODE_OPTIONS: ${NODE_OPTIONS:---max-old-space-size=3072}
      PORT: 8062
      HOSTNAME: 0.0.0.0
      DATABASE_URL: ${DATABASE_URL:-postgresql://nextjs_starter_kit:nextjs_starter_kit@postgres:5432/nextjs_starter_kit?schema=public}
      REDIS_URL: redis://redis:6379/0
      AUTH_CODE_SECRET: ${AUTH_CODE_SECRET:?AUTH_CODE_SECRET is required}
      RESEND_API_KEY: ${RESEND_API_KEY:?RESEND_API_KEY is required}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:?RESEND_FROM_EMAIL is required}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_ENDPOINT_URL: ${R2_ENDPOINT_URL:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-}
      TINYPNG_API_KEY: ${TINYPNG_API_KEY:-}
    ports:
      - '${APP_PORT:-8062}:8062'

  migrate:
    image: ${MIGRATE_IMAGE:?MIGRATE_IMAGE is required, for example ghcr.io/owner/nextjs-starter-kit:latest-migrate}
    profiles:
      - tools
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://nextjs_starter_kit:nextjs_starter_kit@postgres:5432/nextjs_starter_kit?schema=public}

volumes:
  postgres-prod-data:
  redis-prod-data:
